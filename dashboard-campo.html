<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Pantanal · Dashboard Campo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0c;--surface:#141414;--surface2:#1c1c1c;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#f0ede8;--muted:rgba(240,237,232,.4);--muted2:rgba(240,237,232,.65);
  --accent:#b8f04a;--amber:#f0a830;--red:#f05050;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--display)}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:20}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.topbar-name{font-size:13px;font-weight:700}
.topbar-sub{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em}
.btn-refresh{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted2);padding:5px 10px;font-family:var(--mono);font-size:10px;cursor:pointer}
.btn-refresh:active{background:var(--surface2)}

.semana-filter{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--border)}
.semana-filter::-webkit-scrollbar{display:none}
.sem-btn{flex-shrink:0;padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-family:var(--mono);font-size:11px;color:var(--muted2);cursor:pointer;white-space:nowrap}
.sem-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(184,240,74,.06)}

.content{padding:16px}
.loading{text-align:center;padding:60px 20px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.spinner-w{display:inline-block;width:14px;height:14px;border:2px solid rgba(240,237,232,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.section{margin-bottom:24px}
.sec-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.sec-icon{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.sec-title{font-size:15px;font-weight:700}

.kpi-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.kpi-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.kpi-val{font-family:var(--mono);font-size:17px;font-weight:500;line-height:1}
.kpi-sub{font-family:var(--mono);font-size:9px;color:var(--muted2);margin-top:3px}

.finca-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.finca-row:last-child{border-bottom:none}
.finca-name{font-size:13px;font-weight:600;flex:1}
.finca-meta{font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:2px}
.bar-wrap{height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;margin-top:5px}
.bar-fill{height:100%;border-radius:1px}
.finca-val{font-family:var(--mono);font-size:14px;font-weight:500;flex-shrink:0;margin-left:12px;text-align:right}
.finca-val-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;text-align:right}

.rank-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.rank-num{font-family:var(--mono);font-size:11px;color:var(--muted);width:18px;flex-shrink:0;text-align:center}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-meta{font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:2px}
.rank-nota{text-align:right;flex-shrink:0}
.rank-nota-num{font-family:var(--mono);font-size:17px;font-weight:500}
.rank-nota-den{font-family:var(--mono);font-size:9px;color:var(--muted)}

.alerta-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;border:1px solid}
.alerta-red{background:rgba(240,80,80,.08);border-color:rgba(240,80,80,.2)}
.alerta-amber{background:rgba(240,168,48,.08);border-color:rgba(240,168,48,.2)}
.alerta-green{background:rgba(184,240,74,.06);border-color:rgba(184,240,74,.15)}
.alerta-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alerta-title{font-size:12px;font-weight:600;margin-bottom:2px}
.alerta-sub{font-family:var(--mono);font-size:10px;color:var(--muted2);line-height:1.5}

.agro-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.agro-row:last-child{border-bottom:none}
.agro-badges{display:flex;gap:8px;flex-shrink:0}
.badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:6px;background:var(--surface2);border:1px solid var(--border)}

.empty{text-align:center;padding:24px 0;font-family:var(--mono);font-size:11px;color:var(--muted)}
.divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-dot"></div>
    <div>
      <div class="topbar-name">Pantanal · Campo</div>
      <div class="topbar-sub" id="topbar-sub">Dashboard</div>
    </div>
  </div>
  <button class="btn-refresh" onclick="cargarDatos()">↻ Actualizar</button>
</div>

<div class="semana-filter" id="semana-filter"></div>

<div class="content">
  <div id="loading" class="loading"><span class="spinner-w"></span>Cargando datos...</div>
  <div id="main-content" style="display:none"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfQLFt4hMUlhrdFkfz-cnghpcWjYNBqxCai4sWew-IBS0JPGXcw6lLTqm8kqrA5Iss/exec";
const FINCAS = ["Los Corrales","Andino","Chipo","Castañeda","Marujita"];
const C = {
  fecha:0,semana:1,finca:2,lote_nov:3,by:4,
  rac_pesados:5,peso_prom:6,
  cal100:7,cal70:8,cal50:9,cal20:10,
  verdes:11,pintones:12,sobremaduros:13,frutos_sin:14,fruta_sin_cortar:15,
  lote_polin:16,polinizador:17,
  inf_base:18,inf_parcial:19,inf_sin:20,
  ana:21,apertura:22,rend_ha:23,
  cal_tec:24,cal_cob:25,cal_mar:26,cal_eq:27,nota:28,
  def_pct:29,tipo_def:30,
  plagas:31,pct_plagas:32,
  maleza:32,poda:33,obs:34
};

let allData=[], semanaActiva='todas';

document.getElementById('topbar-sub').textContent =
  new Date().toLocaleDateString('es-EC',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();

function cargarDatos(){
  document.getElementById('loading').style.display='block';
  document.getElementById('main-content').style.display='none';

  const cbName='_pantanalCb_'+Date.now();
  window[cbName]=function(json){
    delete window[cbName];
    const s=document.getElementById('jsonp-script');
    if(s) s.remove();
    if(json.ok&&json.registros){
      allData=json.registros.slice(1).filter(r=>r[C.finca]&&r[C.fecha]);
      buildSemanaFilter();
      renderAll();
      document.getElementById('loading').style.display='none';
      document.getElementById('main-content').style.display='block';
    }
  };

  const script=document.createElement('script');
  script.id='jsonp-script';
  script.src=SCRIPT_URL+'?callback='+cbName;
  script.onerror=function(){
    document.getElementById('loading').innerHTML='<span style="color:var(--red)">// sin conexión — verifica internet</span>';
  };
  document.head.appendChild(script);
}

function buildSemanaFilter(){
  const semanas=[...new Set(allData.map(r=>r[C.semana]))].filter(Boolean).sort((a,b)=>b-a).slice(0,8);
  document.getElementById('semana-filter').innerHTML=
    `<button class="sem-btn active" onclick="setSemana('todas',this)">Todas</button>`+
    semanas.map(s=>`<button class="sem-btn" onclick="setSemana('${s}',this)">Sem ${s}</button>`).join('');
}

function setSemana(s,btn){
  semanaActiva=s;
  document.querySelectorAll('.sem-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function getData(){
  if(semanaActiva==='todas') return allData;
  return allData.filter(r=>String(r[C.semana])===String(semanaActiva));
}

function getUltimaRonda(data){
  const ur={};
  data.forEach(r=>{
    const f=r[C.finca];
    const fecha=new Date(r[C.fecha]);
    if(!ur[f]||fecha>new Date(ur[f][C.fecha])) ur[f]=r;
  });
  return ur;
}

function color3(val,good,mid){
  return val>=good?'var(--accent)':val>=mid?'var(--amber)':'var(--red)';
}

function renderAll(){
  const data=getData();
  const ur=getUltimaRonda(data);
  let html='';

  // ── 1. KPIs GLOBALES ──────────────────────────
  const pesosValidos=data.filter(r=>Number(r[C.peso_prom])>0);
  const promPeso=pesosValidos.length?(pesosValidos.reduce((s,r)=>s+Number(r[C.peso_prom]),0)/pesosValidos.length).toFixed(1):'—';
  const dataConPolin=data.filter(r=>r[C.polinizador]&&(Number(r[C.inf_base])+Number(r[C.inf_parcial])+Number(r[C.inf_sin]))>0);
  const promNota=dataConPolin.length?(dataConPolin.reduce((s,r)=>s+Number(r[C.nota]),0)/dataConPolin.length).toFixed(0):'—';
  const totalBase=dataConPolin.reduce((s,r)=>s+Number(r[C.inf_base]),0);
  const totalAll=dataConPolin.reduce((s,r)=>s+(Number(r[C.inf_base])+Number(r[C.inf_parcial])+Number(r[C.inf_sin])),0);
  const pctPolin=totalAll>0?Math.round(totalBase/totalAll*100):0;

  html+=`<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-lbl">Peso prom.</div><div class="kpi-val" style="color:${color3(parseFloat(promPeso),18,14)}">${promPeso}<span style="font-size:10px;color:var(--muted)"> kg</span></div><div class="kpi-sub">racimo</div></div>
    <div class="kpi-card"><div class="kpi-lbl">Polinización</div><div class="kpi-val" style="color:${color3(pctPolin,80,60)}">${pctPolin}<span style="font-size:10px;color:var(--muted)">%</span></div><div class="kpi-sub">correcta</div></div>
    <div class="kpi-card"><div class="kpi-lbl">Nota prom.</div><div class="kpi-val" style="color:${color3(parseFloat(promNota),80,60)}">${promNota}<span style="font-size:10px;color:var(--muted)">/100</span></div><div class="kpi-sub">polinizadores</div></div>
  </div>`;

  // ── 2. ALERTAS ────────────────────────────────
  const alertas=[];
  FINCAS.forEach(f=>{
    const r=ur[f]; if(!r) return;
    const plagas=r[C.plagas]; const pctP=r[C.pct_plagas];
    const def=r[C.tipo_def]; const pctD=r[C.def_pct];
    if(plagas&&!plagas.includes('Sin presencia')){
      if(pctP==='>50%') alertas.push({nivel:'red',titulo:`${f} — Plagas críticas`,sub:`${plagas} · ${pctP} afectadas`});
      else alertas.push({nivel:'amber',titulo:`${f} — Plagas detectadas`,sub:`${plagas} · ${pctP||'<20%'} afectadas`});
    }
    if(def){
      if(pctD==='>50%') alertas.push({nivel:'red',titulo:`${f} — Deficiencia crítica`,sub:`${def} · ${pctD} palmas`});
      else if(pctD==='20-50%') alertas.push({nivel:'amber',titulo:`${f} — Deficiencia moderada`,sub:`${def} · ${pctD} palmas`});
    }
  });
  if(!alertas.length) alertas.push({nivel:'green',titulo:'Sin alertas activas',sub:'Todas las fincas en estado normal'});

  html+=`<div class="section">
    <div class="sec-header"><div class="sec-icon">Alertas</div></div>
    ${alertas.map(a=>`<div class="alerta-item alerta-${a.nivel}">
      <div class="alerta-dot" style="background:${a.nivel==='red'?'var(--red)':a.nivel==='amber'?'var(--amber)':'var(--accent)'}"></div>
      <div><div class="alerta-title">${a.titulo}</div><div class="alerta-sub">${a.sub}</div></div>
    </div>`).join('')}
  </div>`;

  // ── 3. CALIDAD COSECHA ────────────────────────
  html+=`<div class="section">
    <div class="sec-header"><div class="sec-icon">Calidad cosecha</div><div class="sec-title">Peso · Formación · Madurez</div></div>`;

  // Peso por finca
  const maxPeso=Math.max(...FINCAS.map(f=>{
    const rows=data.filter(r=>r[C.finca]===f&&Number(r[C.peso_prom])>0);
    return rows.length?rows.reduce((s,r)=>s+Number(r[C.peso_prom]),0)/rows.length:0;
  }),1);
  html+=FINCAS.map(f=>{
    const rows=data.filter(r=>r[C.finca]===f&&Number(r[C.peso_prom])>0);
    if(!rows.length) return `<div class="finca-row"><div class="finca-name">${f}</div><div class="finca-val" style="color:var(--muted)">—</div></div>`;
    const prom=(rows.reduce((s,r)=>s+Number(r[C.peso_prom]),0)/rows.length).toFixed(1);
    const pct=Math.round(prom/maxPeso*100);
    const col=color3(parseFloat(prom),18,14);
    return `<div class="finca-row"><div style="flex:1"><div class="finca-name">${f}</div><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div></div><div style="margin-left:12px;text-align:right"><div class="finca-val" style="color:${col}">${prom} kg</div><div class="finca-val-sub">${rows.length} reg.</div></div></div>`;
  }).join('');

  // Formación y madurez última ronda
  html+=`<div style="height:12px"></div>`;
  html+=FINCAS.map(f=>{
    const r=ur[f]; if(!r) return '';
    const t=Number(r[C.cal100])+Number(r[C.cal70])+Number(r[C.cal50])+Number(r[C.cal20]);
    const sinR=Number(r[C.frutos_sin])||0;
    const sinC=Number(r[C.fruta_sin_cortar])||0;
    if(!t&&!sinR&&!sinC) return '';
    const pctBuenos=t>0?Math.round((Number(r[C.cal100])+Number(r[C.cal70]))/t*100):null;
    const col=pctBuenos!==null?color3(pctBuenos,70,50):'var(--muted2)';
    return `<div class="finca-row">
      <div style="flex:1"><div class="finca-name">${f}</div>
      <div class="finca-meta">${t?`${pctBuenos}% bien formados (${t} rac.)`:''}${(sinR||sinC)?(t?' · ':'')+`${sinR+sinC} pendientes campo`:''}</div></div>
      ${pctBuenos!==null?`<div class="finca-val" style="color:${col}">${pctBuenos}%</div>`:''}
    </div>`;
  }).filter(Boolean).join('');
  html+=`</div>`;

  // ── 4. POLINIZACIÓN ───────────────────────────
  html+=`<div class="section">
    <div class="sec-header"><div class="sec-icon">Polinización</div><div class="sec-title">Ranking · Cobertura</div></div>`;

  // Ranking
  const byPolin={};
  dataConPolin.forEach(r=>{
    const n=r[C.polinizador]; if(!n) return;
    if(!byPolin[n]) byPolin[n]={notas:[],corrects:0,total:0,fincas:new Set()};
    byPolin[n].notas.push(Number(r[C.nota]));
    byPolin[n].corrects+=Number(r[C.inf_base])||0;
    byPolin[n].total+=(Number(r[C.inf_base])||0)+(Number(r[C.inf_parcial])||0)+(Number(r[C.inf_sin])||0);
    byPolin[n].fincas.add(r[C.finca]);
  });
  const ranking=Object.entries(byPolin)
    .map(([n,d])=>({
      nombre:n,
      notaProm:(d.notas.reduce((a,b)=>a+b,0)/d.notas.length).toFixed(0),
      eval:d.notas.length,
      pctCorrectas:d.total>0?Math.round(d.corrects/d.total*100):0,
      finca:[...d.fincas].join(', ')
    }))
    .sort((a,b)=>b.notaProm-a.notaProm);

  if(!ranking.length) html+=`<div class="empty">Sin evaluaciones</div>`;
  else html+=ranking.map((p,i)=>{
    const nota=parseFloat(p.notaProm);
    const col=color3(nota,80,60);
    const sem=nota>=80?'🟢':nota>=60?'🟡':'🔴';
    return `<div class="rank-item">
      <div class="rank-num">#${i+1}</div>
      <div class="rank-info"><div class="rank-name">${p.nombre}</div>
      <div class="rank-meta">${p.finca} · ${p.eval} eval. · ${p.pctCorrectas}% inf. correctas</div></div>
      <div class="rank-nota"><div class="rank-nota-num" style="color:${col}">${p.notaProm}</div><div class="rank-nota-den">/100 ${sem}</div></div>
    </div>`;
  }).join('');

  // % correctas por finca
  html+=`<div style="height:10px"></div>`;
  html+=FINCAS.map(f=>{
    const rows=dataConPolin.filter(r=>r[C.finca]===f);
    if(!rows.length) return '';
    const base=rows.reduce((s,r)=>s+Number(r[C.inf_base]),0);
    const all=rows.reduce((s,r)=>s+(Number(r[C.inf_base])+Number(r[C.inf_parcial])+Number(r[C.inf_sin])),0);
    const pct=all>0?Math.round(base/all*100):0;
    const col=color3(pct,80,60);
    return `<div class="finca-row"><div style="flex:1"><div class="finca-name">${f}</div><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div></div><div class="finca-val" style="color:${col};margin-left:12px">${pct}%</div></div>`;
  }).filter(Boolean).join('');
  html+=`</div>`;

  // ── 5. SANIDAD ────────────────────────────────
  html+=`<div class="section">
    <div class="sec-header"><div class="sec-icon">Sanidad</div><div class="sec-title">Plagas · Deficiencias</div></div>`;
  html+=FINCAS.map(f=>{
    const r=ur[f]; if(!r) return '';
    const plagas=r[C.plagas]; const pctP=r[C.pct_plagas];
    const def=r[C.tipo_def]; const pctD=r[C.def_pct];
    const sinPlagas=!plagas||plagas.includes('Sin presencia');
    const sinDef=!def;
    if(sinPlagas&&sinDef) return `<div class="finca-row"><div class="finca-name">${f}</div><div class="finca-val" style="color:var(--accent);font-size:12px">Sin alertas</div></div>`;
    return `<div class="finca-row"><div style="flex:1"><div class="finca-name">${f}</div>
      ${!sinPlagas?`<div class="finca-meta" style="color:${pctP==='>50%'?'var(--red)':'var(--amber)'}">${plagas} · ${pctP||'<20%'}</div>`:''}
      ${!sinDef?`<div class="finca-meta" style="color:${pctD==='>50%'?'var(--red)':pctD==='20-50%'?'var(--amber)':'var(--muted2)'}">${def} · ${pctD||'<20%'}</div>`:''}
    </div></div>`;
  }).filter(Boolean).join('');
  html+=`</div>`;

  // ── 6. GESTIÓN AGRONÓMICA ─────────────────────
  const MCOL={'10':'var(--accent)','25':'var(--accent)','50':'var(--amber)','75':'var(--red)','90':'var(--red)'};
  const PCOL={'0 hojas':'var(--accent)','1 a 2 hojas':'var(--accent)','3 a 5 hojas':'var(--amber)','mas de 5 hojas':'var(--red)'};
  html+=`<div class="section">
    <div class="sec-header"><div class="sec-icon">Gestión agronómica</div><div class="sec-title">Maleza · Poda</div></div>`;
  html+=FINCAS.map(f=>{
    const r=ur[f]; if(!r) return `<div class="finca-row"><div class="finca-name">${f}</div><div class="finca-val" style="color:var(--muted)">Sin datos</div></div>`;
    const m=String(r[C.maleza]); const p=String(r[C.poda]);
    const mc=MCOL[m]||'var(--muted2)'; const pc=PCOL[p]||'var(--muted2)';
    return `<div class="agro-row">
      <div class="finca-name">${f}</div>
      <div class="agro-badges">
        <div class="badge" style="color:${mc}">Maleza ${m?m+'%':'—'}</div>
        <div class="badge" style="color:${pc}">Poda ${p||'—'} hojas</div>
      </div>
    </div>`;
  }).join('');
  html+=`</div>`;

  document.getElementById('main-content').innerHTML=html;
}
